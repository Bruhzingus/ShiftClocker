<!DOCTYPE html>
<html lang="en" class="dark">
<head>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- jsPDF + autotable for PDF export -->

  <style>
    :root { color-scheme: dark; }
    html, body { background: #09090b; }
    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
    }
    .num { font-variant-numeric: tabular-nums; font-family: 'Geist Mono', ui-monospace, monospace; }
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
    .scrollbar-hidden { scrollbar-width: none; }

    /* hide number input spinners */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* date/time pickers in dark mode */
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator { filter: invert(0.85); cursor: pointer; }

    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }

    @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    @keyframes pop     { from { transform: scale(0.96); opacity: 0 } to { transform: scale(1); opacity: 1 } }
    .anim-fade  { animation: fadeIn 180ms ease-out }
    .anim-slide { animation: slideUp 220ms cubic-bezier(.2,.7,.2,1) }
    .anim-pop   { animation: pop 160ms ease-out }

    /* subtle ambient gradient at the top */
    .ambient::before {
      content: '';
      position: fixed; inset: 0 0 auto 0; height: 240px;
      background: radial-gradient(ellipse 80% 100% at 50% 0%, rgba(245,158,11,0.06), transparent 60%);
      pointer-events: none; z-index: 0;

  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 ambient">
  <div id="root" class="relative z-10"></div>

  <script type="text/babel" data-presets="react">
  /* =============================================================
     Worklog — single-file React app (no build)
     ============================================================= */
  const { useState, useEffect, useMemo, useRef, useCallback } = React;

  /* -------------------- Storage hook -------------------- */
  function useLocalStorage(key, initial) {
    const [value, setValue] = useState(() => {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null) return typeof initial === 'function' ? initial() : initial;
        return JSON.parse(raw);
      } catch { return typeof initial === 'function' ? initial() : initial; }
    });
    useEffect(() => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }, [key, value]);
    return [value, setValue];
  }

  /* -------------------- Utilities -------------------- */
  const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

  const pad2 = (n) => String(n).padStart(2, '0');

  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function parseTime(t) {
    if (!t || !/^\d{1,2}:\d{2}$/.test(t)) return null;
    const [h, m] = t.split(':').map(Number);
    if (h < 0 || h > 23 || m < 0 || m > 59) return null;
    return h * 60 + m;
  }

  function shiftMinutes(start, end) {
    const s = parseTime(start), e = parseTime(end);
    if (s === null || e === null) return 0;
    let diff = e - s;
    if (diff <= 0) diff += 24 * 60; // overnight
    return diff;
  }

  function formatHM(totalMinutes) {
    if (!Number.isFinite(totalMinutes) || totalMinutes <= 0) return '0h';
    const h = Math.floor(totalMinutes / 60);
    const m = totalMinutes % 60;
    return m === 0 ? `${h}h` : `${h}h ${m}m`;
  }

  function decimalHours(totalMinutes) {
    return Math.round((totalMinutes / 60) * 100) / 100;
  }

  function formatMoney(n) {
    if (!Number.isFinite(n)) return '$0.00';
    return n.toLocaleString(undefined, { style: 'currency', currency: 'USD' });
  }

  function formatDateLong(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    return date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatDateShort(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function computeShift(shift, settings) {
    const total = shiftMinutes(shift.start, shift.end);
    const breakMin = settings.trackBreaks ? (Number(shift.breakMinutes) || 0) : 0;
    const breakDeduct = shift.breakPaid ? 0 : breakMin;
    const paidMinutes = Math.max(0, total - breakDeduct);
    const paidHours = paidMinutes / 60;

    const otMin = settings.trackOvertime ? (Number(shift.overtimeMinutes) || 0) : 0;
    const otHours = Math.min(otMin / 60, paidHours);
    const regularHours = Math.max(0, paidHours - otHours);

    const rate = Number(shift.hourlyRate) || 0;
    const mult = Number(settings.overtimeMultiplier) || 1.5;
    const pay = regularHours * rate + otHours * rate * mult;

    return { totalMinutes: total, paidMinutes, paidHours, regularHours, otHours, pay };
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  /* -------------------- CSV export -------------------- */
  function csvEscape(v) {
    if (v == null) return '';
    const s = String(v);
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function generateCSV(shifts, settings) {
    const cols = ['Date', 'Start', 'End', 'Paid Hours'];
    if (settings.trackBreaks)   cols.push('Break (min)', 'Break Paid');
    if (settings.trackOvertime) cols.push('Overtime (min)');
    if (settings.showWage)      cols.push('Hourly Rate', 'Pay');
    if (settings.trackMileage)  cols.push('Mileage (km)');
    if (settings.trackTags)     cols.push('Tags');
    cols.push('Notes');

    const rows = [cols.map(csvEscape).join(',')];
    for (const s of shifts) {
      const c = computeShift(s, settings);
      const r = [s.date, s.start, s.end, decimalHours(c.paidMinutes).toFixed(2)];
      if (settings.trackBreaks)   r.push(s.breakMinutes || 0, s.breakPaid ? 'yes' : 'no');
      if (settings.trackOvertime) r.push(s.overtimeMinutes || 0);
      if (settings.showWage)      r.push((Number(s.hourlyRate)||0).toFixed(2), c.pay.toFixed(2));
      if (settings.trackMileage)  r.push(s.mileageKm || 0);
      if (settings.trackTags)     r.push((s.tags || []).join(', '));
      r.push(s.notes || '');
      rows.push(r.map(csvEscape).join(','));
    }
    return rows.join('\r\n');
  }

  /* -------------------- PDF export -------------------- */
  function generatePDF(shifts, settings, summaryText, dateRangeText) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text('Worklog', 40, 50);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(110);
    if (dateRangeText) doc.text(dateRangeText, 40, 68);
    if (summaryText)   doc.text(summaryText, 40, 84);
    doc.setTextColor(0);

    const head = [['Date', 'Times', 'Hours']];
    if (settings.trackBreaks)   head[0].push('Break');
    if (settings.trackOvertime) head[0].push('OT');
    if (settings.showWage)      head[0].push('Pay');
    if (settings.trackMileage)  head[0].push('km');
    head[0].push('Notes');

    const body = shifts.map(s => {
      const c = computeShift(s, settings);
      const row = [
        formatDateShort(s.date),
        `${s.start}–${s.end}`,
        formatHM(c.paidMinutes),
      ];
      if (settings.trackBreaks)   row.push((s.breakMinutes||0) + 'm' + (s.breakPaid ? ' (paid)' : ''));
      if (settings.trackOvertime) row.push(formatHM(Number(s.overtimeMinutes)||0));
      if (settings.showWage)      row.push(formatMoney(c.pay));
      if (settings.trackMileage)  row.push(String(s.mileageKm || 0));
      row.push(s.notes || '');
      return row;
    });

    doc.autoTable({
      head, body,
      startY: 100,
      styles: { font: 'helvetica', fontSize: 9, cellPadding: 6, valign: 'top', overflow: 'linebreak' },
      headStyles: { fillColor: [24, 24, 27], textColor: 250, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 248, 248] },
      columnStyles: { [head[0].length - 1]: { cellWidth: 'auto' } },
      margin: { left: 40, right: 40 },
    });

    doc.save(`worklog-${todayISO()}.pdf`);
  }

  /* -------------------- ICS (calendar) -------------------- */
  function icsEscape(s) {
    return String(s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
  }
  function icsDateTime(dateISO, timeHM, addOvernight) {
    const [y, m, d] = dateISO.split('-').map(Number);
    const [hh, mm] = timeHM.split(':').map(Number);
    const dt = new Date(y, m - 1, d, hh, mm);
    if (addOvernight) dt.setDate(dt.getDate() + 1);
    return `${dt.getFullYear()}${pad2(dt.getMonth()+1)}${pad2(dt.getDate())}T${pad2(dt.getHours())}${pad2(dt.getMinutes())}00`;
  }
  function icsStamp() {
    const d = new Date();
    return `${d.getUTCFullYear()}${pad2(d.getUTCMonth()+1)}${pad2(d.getUTCDate())}T${pad2(d.getUTCHours())}${pad2(d.getUTCMinutes())}${pad2(d.getUTCSeconds())}Z`;
  }
  function buildVEvent(shift) {
    const sMin = parseTime(shift.start), eMin = parseTime(shift.end);
    const overnight = eMin !== null && sMin !== null && eMin <= sMin;
    const summary = (shift.tags && shift.tags.length) ? shift.tags[0] : 'Shift';
    const desc = shift.notes || '';
    return [
      'BEGIN:VEVENT',
      `UID:${shift.id}@worklog.local`,
      `DTSTAMP:${icsStamp()}`,
      `DTSTART:${icsDateTime(shift.date, shift.start, false)}`,
      `DTEND:${icsDateTime(shift.date, shift.end, overnight)}`,
      `SUMMARY:${icsEscape(summary)}`,
      `DESCRIPTION:${icsEscape(desc)}`,
      'END:VEVENT'
    ].join('\r\n');
  }
  function generateICS(shifts) {
    const events = shifts.map(buildVEvent).join('\r\n');
    return [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Worklog//EN',
      'CALSCALE:GREGORIAN',
      events,
      'END:VCALENDAR'
    ].join('\r\n');
  }

  /* -------------------- Defaults / seed -------------------- */
  const DEFAULT_SETTINGS = {
    showWage: true,
    trackOvertime: true,
    trackMileage: true,
    trackBreaks: true,
    trackTags: true,
    defaultHourlyRate: 25,
    overtimeMultiplier: 1.5,
    mileageRate: 0.7,
  };

  function seedShifts() {
    const t = todayISO();
    const yest = (() => { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; })();
    const twoAgo = (() => { const d = new Date(); d.setDate(d.getDate()-2); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; })();
    return [
      { id: uid(), date: t, start: '09:00', end: '17:30', hourlyRate: 25, breakMinutes: 30, breakPaid: false, overtimeMinutes: 0, mileageKm: 12, notes: 'Welcome to Worklog. Tap any card to edit it. Notes never get truncated — write as much as you need.\n\nTry: tap the gear (top-right) to toggle wage / overtime / mileage tracking. Use the Quick Shifts dropdown to add a shift in two taps.', tags: ['onboarding'] },
      { id: uid(), date: yest, start: '08:00', end: '16:00', hourlyRate: 25, breakMinutes: 30, breakPaid: false, overtimeMinutes: 0, mileageKm: 8, notes: 'Trained the new hire on POS system. Slow afternoon — reorganized the back stock.', tags: ['training'] },
      { id: uid(), date: twoAgo, start: '14:00', end: '22:30', hourlyRate: 25, breakMinutes: 45, breakPaid: false, overtimeMinutes: 60, mileageKm: 8, notes: 'Closing shift. Stayed an hour late to cover for Alex. Cash-out balanced. Restocked everything for the morning.', tags: ['closing'] },
    ];
  }

  function seedQuickShifts() {
    return [
      { id: uid(), name: 'Day 8h',   start: '09:00', end: '17:30', hourlyRate: 25, breakMinutes: 30, breakPaid: false, overtimeMinutes: 0, tags: [] },
      { id: uid(), name: 'Night 12h', start: '18:00', end: '06:00', hourlyRate: 28, breakMinutes: 60, breakPaid: true,  overtimeMinutes: 0, tags: ['night'] },
    ];
  }

  /* -------------------- UI primitives -------------------- */
  function Btn({ children, onClick, variant='secondary', className='', type, disabled, title, ...rest }) {
    const base = 'inline-flex items-center justify-center gap-2 rounded-xl font-medium transition active:scale-[0.98] disabled:opacity-40 disabled:pointer-events-none';
    const sizes = 'px-4 h-11 text-sm';
    const variants = {
      primary:   'bg-accent-500 text-zinc-950 hover:bg-accent-400 shadow-[0_0_0_1px_rgba(245,158,11,0.25)]',
      secondary: 'bg-zinc-900 text-zinc-100 hover:bg-zinc-800 ring-1 ring-zinc-800',
      ghost:     'bg-transparent text-zinc-300 hover:bg-zinc-900 ring-1 ring-transparent hover:ring-zinc-800',
      danger:    'bg-red-500/10 text-red-400 hover:bg-red-500/20 ring-1 ring-red-500/30',
    };
    return (
      <button type={type || 'button'} onClick={onClick} disabled={disabled} title={title}
              className={`${base} ${sizes} ${variants[variant]} ${className}`} {...rest}>
        {children}
      </button>
    );
  }

  function IconBtn({ children, onClick, label, className='' }) {
    return (
      <button type="button" onClick={onClick} aria-label={label} title={label}
              className={`inline-flex items-center justify-center w-11 h-11 rounded-xl bg-zinc-900 hover:bg-zinc-800 ring-1 ring-zinc-800 transition active:scale-95 ${className}`}>
        {children}
      </button>
    );
  }

  function Field({ label, hint, children }) {
    return (
      <label className="block">
        <div className="flex items-baseline justify-between mb-1.5">
          <span className="text-xs font-medium uppercase tracking-wider text-zinc-400">{label}</span>
          {hint && <span className="text-[11px] text-zinc-500">{hint}</span>}
        </div>
        {children}
      </label>
    );
  }

  function Input(props) {
    return <input {...props}
      className={`w-full h-11 px-3.5 rounded-xl bg-zinc-900 text-zinc-100 ring-1 ring-zinc-800 focus:ring-accent-500 focus:bg-zinc-900 outline-none placeholder:text-zinc-600 transition ${props.className || ''}`} />;
  }

  function Textarea(props) {
    return <textarea {...props}
      className={`w-full px-3.5 py-3 rounded-xl bg-zinc-900 text-zinc-100 ring-1 ring-zinc-800 focus:ring-accent-500 outline-none placeholder:text-zinc-600 resize-y leading-relaxed transition ${props.className || ''}`} />;
  }

  function Select({ value, onChange, children, className='' }) {
    return (
      <select value={value} onChange={onChange}
        className={`w-full h-11 px-3.5 pr-9 rounded-xl bg-zinc-900 text-zinc-100 ring-1 ring-zinc-800 focus:ring-accent-500 outline-none appearance-none transition ${className}`}
        style={{ backgroundImage: "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%23a1a1aa' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' d='M1 1.5l5 5 5-5'/></svg>\")", backgroundRepeat: 'no-repeat', backgroundPosition: 'right 12px center' }}>
        {children}
      </select>
    );
  }

  function Toggle({ checked, onChange, label, hint }) {
    return (
      <button type="button" onClick={() => onChange(!checked)}
              className="w-full flex items-center justify-between gap-4 py-3.5 px-1 min-h-[52px] text-left active:opacity-80">
        <div className="min-w-0">
          <div className="text-sm font-medium text-zinc-100">{label}</div>
          {hint && <div className="text-xs text-zinc-500 mt-0.5">{hint}</div>}
        </div>
        <span aria-checked={checked} role="switch"
              className={`relative inline-flex shrink-0 h-7 w-12 items-center rounded-full transition ${checked ? 'bg-accent-500' : 'bg-zinc-700'}`}>
          <span className={`inline-block h-5 w-5 rounded-full bg-white shadow transition-transform ${checked ? 'translate-x-6' : 'translate-x-1'}`}></span>
        </span>
      </button>
    );
  }

  /* -------------------- Icons (inline SVG) -------------------- */
  const I = {
    plus: (p) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
    gear: (p) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06A2 2 0 1 1 4.29 16.96l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6c.36 0 .69-.11.96-.32"/></svg>,
    download: (p) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
    back: (p) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
    close: (p) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><path d="M18 6L6 18M6 6l12 12"/></svg>,
    trash: (p) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>,
    edit: (p) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>,
    cal: (p) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
    chev: (p) => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>,
    search: (p) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
    car: (p) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 17h14M3 17v-5l2-5h14l2 5v5M7 17v2M17 17v2"/><circle cx="7" cy="14" r="1.2"/><circle cx="17" cy="14" r="1.2"/></svg>,
    coffee: (p) => <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M17 8h1a4 4 0 010 8h-1M3 8h14v9a4 4 0 01-4 4H7a4 4 0 01-4-4V8z"/></svg>,
    bolt: (p) => <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
  };

  /* -------------------- Confirm dialog -------------------- */
  function ConfirmDialog({ open, title, message, confirmLabel='Confirm', danger, onConfirm, onCancel }) {
    if (!open) return null;
    return (
      <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center bg-black/70 anim-fade" onClick={onCancel}>
        <div className="w-full sm:max-w-sm m-3 sm:m-0 rounded-2xl bg-zinc-900 ring-1 ring-zinc-800 p-5 anim-pop" onClick={e=>e.stopPropagation()}>
          <h3 className="text-lg font-semibold mb-1">{title}</h3>
          {message && <p className="text-sm text-zinc-400 mb-5 whitespace-pre-wrap">{message}</p>}
          <div className="flex gap-2 justify-end">
            <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
            <Btn variant={danger ? 'danger' : 'primary'} onClick={onConfirm}>{confirmLabel}</Btn>
          </div>
        </div>
      </div>
    );
  }

  /* -------------------- Shift modal (add/edit) -------------------- */
  function ShiftModal({ open, initial, isEdit, settings, onSave, onDelete, onClose }) {
    const [form, setForm] = useState(() => initial || {});
    useEffect(() => { setForm(initial || {}); }, [initial]);
    const [showDelConfirm, setShowDelConfirm] = useState(false);

    if (!open) return null;

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const valid = (() => {
      if (!form.date || !form.start || !form.end) return false;
      if (parseTime(form.start) === null || parseTime(form.end) === null) return false;
      return true;
    })();

    const c = valid ? computeShift(form, settings) : null;

    const save = () => {
      if (!valid) return;
      const tags = (typeof form._tagsText === 'string')
        ? form._tagsText.split(',').map(t => t.trim()).filter(Boolean)
        : (form.tags || []);
      const out = { ...form, tags };
      delete out._tagsText;
      // numeric coercion
      out.hourlyRate     = Number(out.hourlyRate)     || 0;
      out.breakMinutes   = Number(out.breakMinutes)   || 0;
      out.overtimeMinutes= Number(out.overtimeMinutes)|| 0;
      out.mileageKm      = Number(out.mileageKm)      || 0;
      out.breakPaid      = !!out.breakPaid;
      onSave(out);
    };

    return (
      <div className="fixed inset-0 z-50 bg-zinc-950/95 backdrop-blur anim-fade overflow-y-auto">
        <div className="min-h-full flex flex-col anim-slide">
          {/* header */}
          <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-900">
            <div className="max-w-2xl mx-auto flex items-center justify-between px-4 h-14">
              <button onClick={onClose} className="flex items-center gap-2 text-zinc-300 hover:text-zinc-100 -ml-2 px-2 h-10 rounded-lg" aria-label="Close">
                <I.close />
              </button>
              <h2 className="text-base font-semibold">{isEdit ? 'Edit shift' : 'New shift'}</h2>
              <Btn variant="primary" onClick={save} disabled={!valid} className="!h-9 !px-4">Save</Btn>
            </div>
          </div>

          {/* body */}
          <div className="flex-1 max-w-2xl w-full mx-auto px-4 py-5 space-y-4">

            {valid && (
              <div className="rounded-2xl bg-gradient-to-br from-accent-500/10 to-transparent ring-1 ring-accent-500/20 p-4 flex items-baseline justify-between">
                <div>
                  <div className="text-xs uppercase tracking-wider text-accent-300/80 mb-1">Preview</div>
                  <div className="num text-2xl font-semibold">{formatHM(c.paidMinutes)}</div>
                </div>
                {settings.showWage && <div className="num text-xl font-medium text-accent-400">{formatMoney(c.pay)}</div>}
              </div>
            )}

            <Field label="Date">
              <Input type="date" value={form.date || ''} onChange={e => set('date', e.target.value)} />
            </Field>

            <div className="grid grid-cols-2 gap-3">
              <Field label="Start"><Input type="time" value={form.start || ''} onChange={e => set('start', e.target.value)} /></Field>
              <Field label="End"><Input type="time" value={form.end || ''} onChange={e => set('end', e.target.value)} /></Field>
            </div>

            {settings.showWage && (
              <Field label="Hourly rate" hint="$ per hour">
                <Input type="number" inputMode="decimal" step="0.01" min="0" value={form.hourlyRate ?? ''} onChange={e => set('hourlyRate', e.target.value)} />
              </Field>
            )}

            {settings.trackBreaks && (
              <div className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 p-3 space-y-2">
                <Field label="Break (minutes)">
                  <Input type="number" inputMode="numeric" min="0" step="5" value={form.breakMinutes ?? 0} onChange={e => set('breakMinutes', e.target.value)} />
                </Field>
                <div className="-mx-1">
                  <Toggle checked={!!form.breakPaid} onChange={v => set('breakPaid', v)} label="Paid break" hint="Don't deduct break from paid hours" />
                </div>
              </div>
            )}

            {settings.trackOvertime && (
              <Field label="Overtime (minutes)" hint={`× ${settings.overtimeMultiplier}`}>
                <Input type="number" inputMode="numeric" min="0" step="15" value={form.overtimeMinutes ?? 0} onChange={e => set('overtimeMinutes', e.target.value)} />
              </Field>
            )}

            {settings.trackMileage && (
              <Field label="Mileage (km)">
                <Input type="number" inputMode="decimal" min="0" step="0.1" value={form.mileageKm ?? 0} onChange={e => set('mileageKm', e.target.value)} />
              </Field>
            )}

            {settings.trackTags && (
              <Field label="Tags" hint="Comma separated">
                <Input
                  placeholder="opening, closing"
                  value={form._tagsText !== undefined ? form._tagsText : (form.tags || []).join(', ')}
                  onChange={e => set('_tagsText', e.target.value)}
                />
              </Field>
            )}

            <Field label="Notes">
              <Textarea rows={8} placeholder="What happened during this shift…" value={form.notes || ''} onChange={e => set('notes', e.target.value)} />
            </Field>

            {isEdit && (
              <div className="pt-3">
                <Btn variant="danger" onClick={() => setShowDelConfirm(true)} className="w-full"><I.trash /> Delete shift</Btn>
              </div>
            )}

            <div className="h-8 safe-bottom" />
          </div>
        </div>

        <ConfirmDialog
          open={showDelConfirm}
          title="Delete this shift?"
          message="This cannot be undone."
          confirmLabel="Delete"
          danger
          onConfirm={() => { setShowDelConfirm(false); onDelete(form.id); }}
          onCancel={() => setShowDelConfirm(false)}
        />
      </div>
    );
  }

  /* -------------------- Shift card -------------------- */
  function ShiftCard({ shift, settings, onClick }) {
    const c = computeShift(shift, settings);
    return (
      <button onClick={onClick} className="w-full text-left rounded-2xl bg-zinc-900/70 hover:bg-zinc-900 ring-1 ring-zinc-900 hover:ring-zinc-800 p-5 transition group">
        <div className="flex items-start justify-between gap-4 mb-3">
          <div className="min-w-0">
            <div className="text-[11px] uppercase tracking-[0.18em] text-zinc-500 mb-1">{formatDateLong(shift.date)}</div>
            <div className="num text-xl font-semibold text-zinc-100">{shift.start} <span className="text-zinc-600 mx-1">→</span> {shift.end}</div>
          </div>
          <div className="text-right shrink-0">
            <div className="num text-lg font-semibold text-zinc-100">{formatHM(c.paidMinutes)}</div>
            {settings.showWage && <div className="num text-sm font-medium text-accent-400 mt-0.5">{formatMoney(c.pay)}</div>}
          </div>
        </div>

        {(settings.trackBreaks && (shift.breakMinutes||0) > 0) || (settings.trackOvertime && (shift.overtimeMinutes||0) > 0) || (settings.trackMileage && (shift.mileageKm||0) > 0) || (settings.trackTags && shift.tags && shift.tags.length > 0) ? (
          <div className="flex flex-wrap gap-1.5 mb-3">
            {settings.trackBreaks && (shift.breakMinutes||0) > 0 && (
              <span className="inline-flex items-center gap-1 text-[11px] num px-2 py-1 rounded-md bg-zinc-800/70 text-zinc-300">
                <I.coffee /> {shift.breakMinutes}m{shift.breakPaid ? ' paid' : ''}
              </span>
            )}
            {settings.trackOvertime && (shift.overtimeMinutes||0) > 0 && (
              <span className="inline-flex items-center gap-1 text-[11px] num px-2 py-1 rounded-md bg-accent-500/10 text-accent-400 ring-1 ring-accent-500/20">
                <I.bolt /> OT {formatHM(Number(shift.overtimeMinutes)||0)}
              </span>
            )}
            {settings.trackMileage && (shift.mileageKm||0) > 0 && (
              <span className="inline-flex items-center gap-1 text-[11px] num px-2 py-1 rounded-md bg-zinc-800/70 text-zinc-300">
                <I.car /> {shift.mileageKm} km
              </span>
            )}
            {settings.trackTags && (shift.tags||[]).map(t => (
              <span key={t} className="text-[11px] px-2 py-1 rounded-md bg-zinc-800/70 text-zinc-400">#{t}</span>
            ))}
          </div>
        ) : null}

        {shift.notes && (
          <div className="text-[15px] leading-relaxed text-zinc-300 whitespace-pre-wrap break-words">
            {shift.notes}
          </div>
        )}

        <div className="mt-4 pt-3 border-t border-zinc-900 flex items-center justify-between text-[11px] text-zinc-500">
          <span className="uppercase tracking-wider">Tap to edit</span>
          <span className="opacity-0 group-hover:opacity-100 transition flex items-center gap-1 text-zinc-400"><I.edit /> Edit</span>
        </div>
      </button>
    );
  }

  /* -------------------- Quick shift bar -------------------- */
  function QuickShiftBar({ quickShifts, onUse, onManage }) {
    const [picked, setPicked] = useState(quickShifts[0]?.id || '');
    useEffect(() => { if (!quickShifts.find(q => q.id === picked)) setPicked(quickShifts[0]?.id || ''); }, [quickShifts, picked]);

    const add = () => {
      const q = quickShifts.find(qs => qs.id === picked);
      if (q) onUse(q);
    };

    return (
      <div className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 p-3 flex items-center gap-2">
        <div className="flex-1 min-w-0">
          <Select value={picked} onChange={e => setPicked(e.target.value)}>
            {quickShifts.length === 0 && <option value="">No quick shifts yet</option>}
            {quickShifts.map(q => (
              <option key={q.id} value={q.id}>{q.name} · {q.start}–{q.end}</option>
            ))}
          </Select>
        </div>
        <Btn variant="primary" onClick={add} disabled={!picked}><I.plus /> Add</Btn>
        <IconBtn label="Manage quick shifts" onClick={onManage}><I.gear /></IconBtn>
      </div>
    );
  }

  /* -------------------- Filter bar -------------------- */
  function FilterBar({ search, setSearch, dateFrom, setDateFrom, dateTo, setDateTo, sortBy, setSortBy, onClear }) {
    const [open, setOpen] = useState(false);
    const active = !!(search || dateFrom || dateTo);
    return (
      <div className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 overflow-hidden">
        <div className="flex items-center gap-2 p-2">
          <div className="flex-1 relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none"><I.search /></span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search notes or tags"
                   className="w-full h-11 pl-10 pr-3 rounded-xl bg-zinc-900 ring-1 ring-zinc-800 focus:ring-accent-500 outline-none text-sm placeholder:text-zinc-600" />
          </div>
          <Select value={sortBy} onChange={e => setSortBy(e.target.value)} className="!w-auto">
            <option value="date-desc">Date ↓</option>
            <option value="date-asc">Date ↑</option>
            <option value="hours-desc">Hours</option>
            <option value="pay-desc">Pay</option>
          </Select>
          <IconBtn label="Date filter" onClick={() => setOpen(o => !o)} className={open || dateFrom || dateTo ? '!ring-accent-500/40 !text-accent-400' : ''}>
            <I.cal />
          </IconBtn>
        </div>
        {open && (
          <div className="px-3 pb-3 grid grid-cols-2 gap-2 anim-fade">
            <Field label="From"><Input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} /></Field>
            <Field label="To"><Input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} /></Field>
            {active && <button onClick={onClear} className="col-span-2 text-xs text-zinc-400 hover:text-zinc-200 py-1">Clear filters</button>}
          </div>
        )}
      </div>
    );
  }

  /* -------------------- Summary bar -------------------- */
  function SummaryBar({ shifts, settings }) {
    const totals = useMemo(() => {
      let mins = 0, pay = 0, km = 0;
      for (const s of shifts) {
        const c = computeShift(s, settings);
        mins += c.paidMinutes;
        pay  += c.pay;
        km   += Number(s.mileageKm) || 0;
      }
      return { mins, pay, km };
    }, [shifts, settings]);

    return (
      <div className="flex items-baseline gap-4 px-1 text-sm">
        <span className="text-zinc-400">{shifts.length} shift{shifts.length === 1 ? '' : 's'}</span>
        <span className="text-zinc-600">·</span>
        <span className="num text-zinc-200 font-medium">{formatHM(totals.mins)}</span>
        {settings.showWage && (<><span className="text-zinc-600">·</span><span className="num text-accent-400 font-medium">{formatMoney(totals.pay)}</span></>)}
        {settings.trackMileage && totals.km > 0 && (<><span className="text-zinc-600">·</span><span className="num text-zinc-400">{totals.km.toFixed(1)} km</span></>)}
      </div>
    );
  }

  /* -------------------- Mileage section -------------------- */
  function MileageSection({ shifts, settings, setSettings }) {
    const [open, setOpen] = useState(false);
    if (!settings.trackMileage) return null;

    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const fortnightAgo = new Date(now); fortnightAgo.setDate(fortnightAgo.getDate() - 14);

    let kmMonth = 0, kmFortnight = 0;
    for (const s of shifts) {
      const [y, m, d] = (s.date || '').split('-').map(Number);
      if (!y) continue;
      const dt = new Date(y, m-1, d);
      const km = Number(s.mileageKm) || 0;
      if (dt >= monthStart) kmMonth += km;
      if (dt >= fortnightAgo) kmFortnight += km;
    }
    const rate = Number(settings.mileageRate) || 0;

    return (
      <div className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 overflow-hidden">
        <button onClick={() => setOpen(o => !o)} className="w-full flex items-center justify-between px-4 h-12 text-sm hover:bg-zinc-900/40 transition">
          <span className="flex items-center gap-2 text-zinc-300"><I.car /> Mileage</span>
          <span className="flex items-center gap-2 text-zinc-500">
            <span className="num text-zinc-300">{kmMonth.toFixed(1)} km</span>
            <span className="text-xs uppercase tracking-wider">this month</span>
            <span className={`transition ${open ? 'rotate-180' : ''}`}><I.chev /></span>
          </span>
        </button>
        {open && (
          <div className="px-4 pb-4 anim-fade">
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div className="rounded-xl bg-zinc-900/70 p-3">
                <div className="text-[11px] uppercase tracking-wider text-zinc-500 mb-1">This month</div>
                <div className="num text-lg font-semibold">{kmMonth.toFixed(1)} <span className="text-sm text-zinc-500 font-normal">km</span></div>
                {rate > 0 && <div className="num text-xs text-accent-400 mt-1">{formatMoney(kmMonth * rate)}</div>}
              </div>
              <div className="rounded-xl bg-zinc-900/70 p-3">
                <div className="text-[11px] uppercase tracking-wider text-zinc-500 mb-1">Last 14 days</div>
                <div className="num text-lg font-semibold">{kmFortnight.toFixed(1)} <span className="text-sm text-zinc-500 font-normal">km</span></div>
                {rate > 0 && <div className="num text-xs text-accent-400 mt-1">{formatMoney(kmFortnight * rate)}</div>}
              </div>
            </div>
            <Field label="Reimbursement rate" hint="$ per km">
              <Input type="number" inputMode="decimal" step="0.01" min="0" value={settings.mileageRate ?? 0} onChange={e => setSettings({ ...settings, mileageRate: Number(e.target.value) || 0 })} />
            </Field>
          </div>
        )}
      </div>
    );
  }

  /* -------------------- Export menu -------------------- */
  function ExportMenu({ filteredShifts, settings, summaryText, dateRangeText, onClose }) {
    const exportCSV = () => {
      const csv = generateCSV(filteredShifts, settings);
      downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), `worklog-${todayISO()}.csv`);
      onClose();
    };
    const exportPDF = () => {
      try {
        generatePDF(filteredShifts, settings, summaryText, dateRangeText);
      } catch (err) { alert('PDF export failed: ' + err.message); }
      onClose();
    };
    const exportICS = () => {
      const ics = generateICS(filteredShifts);
      downloadBlob(new Blob([ics], { type: 'text/calendar;charset=utf-8' }), `worklog-${todayISO()}.ics`);
      onClose();
    };

    return (
      <div className="fixed inset-0 z-40 anim-fade" onClick={onClose}>
        <div className="absolute inset-0 bg-black/50" />
        <div className="absolute right-3 top-16 w-64 rounded-2xl bg-zinc-900 ring-1 ring-zinc-800 p-1.5 shadow-2xl anim-pop" onClick={e => e.stopPropagation()}>
          <button onClick={exportCSV} className="w-full text-left flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-zinc-800 transition">
            <I.download /> <div><div className="text-sm font-medium">Export CSV</div><div className="text-xs text-zinc-500">For spreadsheets</div></div>
          </button>
          <button onClick={exportPDF} className="w-full text-left flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-zinc-800 transition">
            <I.download /> <div><div className="text-sm font-medium">Export PDF</div><div className="text-xs text-zinc-500">Printable report</div></div>
          </button>
          <button onClick={exportICS} className="w-full text-left flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-zinc-800 transition">
            <I.cal /> <div><div className="text-sm font-medium">Export to calendar (.ics)</div><div className="text-xs text-zinc-500">Open in your calendar app</div></div>
          </button>
        </div>
      </div>
    );
  }

  /* -------------------- Settings screen -------------------- */
  function SettingsScreen({ settings, setSettings, onBack, onResetAll }) {
    const [confirmReset, setConfirmReset] = useState(0); // 0 none, 1 first, 2 second
    return (
      <div className="anim-fade">
        <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-900">
          <div className="max-w-2xl mx-auto flex items-center gap-2 px-4 h-14">
            <button onClick={onBack} className="-ml-2 px-2 h-10 rounded-lg text-zinc-300 hover:text-zinc-100"><I.back /></button>
            <h2 className="text-base font-semibold">Settings</h2>
          </div>
        </div>

        <div className="max-w-2xl mx-auto px-4 py-5 space-y-6">

          <section className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 p-4 divide-y divide-zinc-900">
            <h3 className="text-xs uppercase tracking-[0.18em] text-zinc-500 pb-2">Tracking</h3>
            <Toggle checked={settings.showWage}      onChange={v => setSettings({...settings, showWage: v})}      label="Show wage"          hint="Display hourly rate and pay" />
            <Toggle checked={settings.trackOvertime} onChange={v => setSettings({...settings, trackOvertime: v})} label="Overtime"           hint="Track OT minutes at multiplier rate" />
            <Toggle checked={settings.trackBreaks}   onChange={v => setSettings({...settings, trackBreaks: v})}   label="Breaks"             hint="Track paid / unpaid breaks" />
            <Toggle checked={settings.trackMileage}  onChange={v => setSettings({...settings, trackMileage: v})}  label="Mileage"            hint="Track km driven per shift" />
            <Toggle checked={settings.trackTags}     onChange={v => setSettings({...settings, trackTags: v})}     label="Tags"               hint="Categorize shifts" />
          </section>

          <section className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 p-4 space-y-3">
            <h3 className="text-xs uppercase tracking-[0.18em] text-zinc-500 mb-1">Defaults</h3>
            <Field label="Default hourly rate" hint="$">
              <Input type="number" inputMode="decimal" step="0.01" min="0" value={settings.defaultHourlyRate ?? 0}
                     onChange={e => setSettings({...settings, defaultHourlyRate: Number(e.target.value) || 0})} />
            </Field>
            {settings.trackOvertime && (
              <Field label="Overtime multiplier" hint="× regular rate">
                <Input type="number" inputMode="decimal" step="0.05" min="1" value={settings.overtimeMultiplier ?? 1.5}
                       onChange={e => setSettings({...settings, overtimeMultiplier: Number(e.target.value) || 1})} />
              </Field>
            )}
            {settings.trackMileage && (
              <Field label="Mileage rate" hint="$ per km">
                <Input type="number" inputMode="decimal" step="0.01" min="0" value={settings.mileageRate ?? 0}
                       onChange={e => setSettings({...settings, mileageRate: Number(e.target.value) || 0})} />
              </Field>
            )}
          </section>

          <section className="rounded-2xl bg-red-950/20 ring-1 ring-red-900/30 p-4">
            <h3 className="text-xs uppercase tracking-[0.18em] text-red-400/80 mb-2">Danger zone</h3>
            <p className="text-xs text-zinc-400 mb-3">Removes all shifts, quick shifts, and settings.</p>
            <Btn variant="danger" onClick={() => setConfirmReset(1)} className="w-full">Reset all data</Btn>
          </section>

          <p className="text-center text-xs text-zinc-600 pt-4">Worklog · single-file · data stored locally on this device</p>
          <div className="h-12 safe-bottom" />
        </div>

        <ConfirmDialog
          open={confirmReset === 1}
          title="Reset all data?"
          message="This wipes shifts, quick shifts, and settings. Export a CSV first if you want a backup."
          confirmLabel="Continue"
          danger
          onConfirm={() => setConfirmReset(2)}
          onCancel={() => setConfirmReset(0)}
        />
        <ConfirmDialog
          open={confirmReset === 2}
          title="Are you really sure?"
          message="Last chance. There is no undo."
          confirmLabel="Yes, wipe everything"
          danger
          onConfirm={() => { setConfirmReset(0); onResetAll(); }}
          onCancel={() => setConfirmReset(0)}
        />
      </div>
    );
  }

  /* -------------------- Quick shifts manager -------------------- */
  function QuickShiftsScreen({ quickShifts, setQuickShifts, settings, onBack }) {
    const [editing, setEditing] = useState(null); // template object or null

    const startNew = () => setEditing({
      id: uid(), name: '', start: '09:00', end: '17:00',
      hourlyRate: settings.defaultHourlyRate, breakMinutes: 30, breakPaid: false, overtimeMinutes: 0, tags: []
    });
    const startEdit = (q) => setEditing({ ...q, _tagsText: (q.tags||[]).join(', ') });
    const save = () => {
      if (!editing.name.trim()) return;
      const tags = (editing._tagsText || '').split(',').map(t => t.trim()).filter(Boolean);
      const out = { ...editing, tags };
      delete out._tagsText;
      out.hourlyRate     = Number(out.hourlyRate)     || 0;
      out.breakMinutes   = Number(out.breakMinutes)   || 0;
      out.overtimeMinutes= Number(out.overtimeMinutes)|| 0;
      const exists = quickShifts.find(q => q.id === out.id);
      setQuickShifts(exists ? quickShifts.map(q => q.id === out.id ? out : q) : [...quickShifts, out]);
      setEditing(null);
    };
    const remove = (id) => setQuickShifts(quickShifts.filter(q => q.id !== id));

    return (
      <div className="anim-fade">
        <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-900">
          <div className="max-w-2xl mx-auto flex items-center gap-2 px-4 h-14">
            <button onClick={onBack} className="-ml-2 px-2 h-10 rounded-lg text-zinc-300 hover:text-zinc-100"><I.back /></button>
            <h2 className="text-base font-semibold flex-1">Quick shifts</h2>
            <Btn variant="primary" onClick={startNew} className="!h-9 !px-3"><I.plus /> New</Btn>
          </div>
        </div>

        <div className="max-w-2xl mx-auto px-4 py-5 space-y-3">
          {quickShifts.length === 0 && (
            <div className="text-center text-zinc-500 py-12">No quick shifts yet. Tap <span className="text-accent-400">New</span> to make one.</div>
          )}
          {quickShifts.map(q => (
            <div key={q.id} className="rounded-2xl bg-zinc-900/70 ring-1 ring-zinc-900 p-4 flex items-center justify-between gap-3">
              <button onClick={() => startEdit(q)} className="flex-1 min-w-0 text-left">
                <div className="font-medium text-zinc-100 truncate">{q.name}</div>
                <div className="text-xs text-zinc-500 num mt-0.5">{q.start}–{q.end} · {settings.showWage ? `$${(Number(q.hourlyRate)||0).toFixed(2)}/h · ` : ''}{q.breakMinutes||0}m break{q.breakPaid?' (paid)':''}</div>
              </button>
              <IconBtn label="Edit" onClick={() => startEdit(q)}><I.edit /></IconBtn>
              <IconBtn label="Delete" onClick={() => remove(q.id)} className="!bg-red-500/10 hover:!bg-red-500/20 !ring-red-500/20 text-red-400"><I.trash /></IconBtn>
            </div>
          ))}
        </div>

        {editing && (
          <div className="fixed inset-0 z-50 bg-zinc-950/95 backdrop-blur anim-fade overflow-y-auto">
            <div className="sticky top-0 z-10 bg-zinc-950/90 backdrop-blur border-b border-zinc-900">
              <div className="max-w-2xl mx-auto flex items-center justify-between px-4 h-14">
                <button onClick={() => setEditing(null)} className="-ml-2 px-2 h-10 rounded-lg text-zinc-300"><I.close /></button>
                <h2 className="text-base font-semibold">Quick shift</h2>
                <Btn variant="primary" onClick={save} disabled={!editing.name.trim()} className="!h-9 !px-4">Save</Btn>
              </div>
            </div>
            <div className="max-w-2xl mx-auto px-4 py-5 space-y-4 anim-slide">
              <Field label="Name"><Input value={editing.name} onChange={e => setEditing({...editing, name: e.target.value})} placeholder="e.g. Day 8h" /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Start"><Input type="time" value={editing.start} onChange={e => setEditing({...editing, start: e.target.value})} /></Field>
                <Field label="End"><Input type="time" value={editing.end} onChange={e => setEditing({...editing, end: e.target.value})} /></Field>
              </div>
              {settings.showWage && <Field label="Hourly rate" hint="$"><Input type="number" inputMode="decimal" step="0.01" min="0" value={editing.hourlyRate} onChange={e => setEditing({...editing, hourlyRate: e.target.value})} /></Field>}
              {settings.trackBreaks && (
                <div className="rounded-2xl bg-zinc-900/40 ring-1 ring-zinc-900 p-3 space-y-2">
                  <Field label="Break (minutes)"><Input type="number" inputMode="numeric" min="0" step="5" value={editing.breakMinutes} onChange={e => setEditing({...editing, breakMinutes: e.target.value})} /></Field>
                  <div className="-mx-1"><Toggle checked={!!editing.breakPaid} onChange={v => setEditing({...editing, breakPaid: v})} label="Paid break" /></div>
                </div>
              )}
              {settings.trackOvertime && <Field label="Overtime (minutes)"><Input type="number" inputMode="numeric" min="0" step="15" value={editing.overtimeMinutes} onChange={e => setEditing({...editing, overtimeMinutes: e.target.value})} /></Field>}
              {settings.trackTags && <Field label="Tags" hint="Comma separated"><Input value={editing._tagsText !== undefined ? editing._tagsText : (editing.tags||[]).join(', ')} onChange={e => setEditing({...editing, _tagsText: e.target.value})} /></Field>}
              <div className="h-12 safe-bottom" />
            </div>
          </div>
        )}
      </div>
    );
  }

  /* -------------------- App -------------------- */
  function App() {
    const [shifts, setShifts]         = useLocalStorage('worklog.shifts.v1', seedShifts);
    const [quickShifts, setQuickShifts]= useLocalStorage('worklog.quickshifts.v1', seedQuickShifts);
    const [settings, setSettings]     = useLocalStorage('worklog.settings.v1', DEFAULT_SETTINGS);
    const [sortBy, setSortBy]         = useLocalStorage('worklog.sort.v1', 'date-desc');

    const [view, setView]             = useState('list'); // list | settings | quickshifts
    const [modal, setModal]           = useState(null);   // {open, shift, isEdit}
    const [exportOpen, setExportOpen] = useState(false);

    const [search, setSearch]         = useState('');
    const [dateFrom, setDateFrom]     = useState('');
    const [dateTo, setDateTo]         = useState('');

    /* settings hygiene: ensure new keys exist if user has older saved settings */
    useEffect(() => {
      let changed = false; const next = { ...settings };
      for (const k of Object.keys(DEFAULT_SETTINGS)) {
        if (next[k] === undefined) { next[k] = DEFAULT_SETTINGS[k]; changed = true; }
      }
      if (changed) setSettings(next);
      // eslint-disable-next-line
    }, []);

    const openNew = useCallback(() => {
      setModal({
        open: true, isEdit: false,
        shift: {
          id: uid(), date: todayISO(), start: '09:00', end: '17:00',
          hourlyRate: settings.defaultHourlyRate, breakMinutes: 30, breakPaid: false,
          overtimeMinutes: 0, mileageKm: 0, notes: '', tags: []
        }
      });
    }, [settings.defaultHourlyRate]);

    const openEdit = useCallback((shift) => {
      setModal({ open: true, isEdit: true, shift: { ...shift } });
    }, []);

    const saveShift = (s) => {
      setShifts(prev => {
        const exists = prev.find(x => x.id === s.id);
        return exists ? prev.map(x => x.id === s.id ? s : x) : [s, ...prev];
      });
      setModal(null);
    };
    const deleteShift = (id) => {
      setShifts(prev => prev.filter(x => x.id !== id));
      setModal(null);
    };

    const useQuick = (q) => {
      const shift = {
        id: uid(), date: todayISO(), start: q.start, end: q.end,
        hourlyRate: q.hourlyRate, breakMinutes: q.breakMinutes, breakPaid: q.breakPaid,
        overtimeMinutes: q.overtimeMinutes, mileageKm: 0, notes: '', tags: q.tags || []
      };
      setShifts(prev => [shift, ...prev]);
    };

    /* filter + sort */
    const filtered = useMemo(() => {
      const q = search.trim().toLowerCase();
      let list = shifts.filter(s => {
        if (q) {
          const hay = ((s.notes||'') + ' ' + (s.tags||[]).join(' ')).toLowerCase();
          if (!hay.includes(q)) return false;
        }
        if (dateFrom && s.date < dateFrom) return false;
        if (dateTo   && s.date > dateTo)   return false;
        return true;
      });
      const cmp = {
        'date-desc':  (a,b) => (b.date+b.start).localeCompare(a.date+a.start),
        'date-asc':   (a,b) => (a.date+a.start).localeCompare(b.date+b.start),
        'hours-desc': (a,b) => computeShift(b, settings).paidMinutes - computeShift(a, settings).paidMinutes,
        'pay-desc':   (a,b) => computeShift(b, settings).pay - computeShift(a, settings).pay,
      }[sortBy] || ((a,b)=>0);
      return [...list].sort(cmp);
    }, [shifts, search, dateFrom, dateTo, sortBy, settings]);

    const summaryText = useMemo(() => {
      let mins = 0, pay = 0, km = 0;
      for (const s of filtered) {
        const c = computeShift(s, settings);
        mins += c.paidMinutes; pay += c.pay; km += Number(s.mileageKm)||0;
      }
      const parts = [`${filtered.length} shifts`, formatHM(mins)];
      if (settings.showWage) parts.push(formatMoney(pay));
      if (settings.trackMileage && km > 0) parts.push(`${km.toFixed(1)} km`);
      return parts.join(' · ');
    }, [filtered, settings]);

    const dateRangeText = useMemo(() => {
      if (filtered.length === 0) return '';
      const dates = filtered.map(s => s.date).sort();
      return `${formatDateLong(dates[0])}  —  ${formatDateLong(dates[dates.length-1])}`;
    }, [filtered]);

    const resetAll = () => {
      try {
        localStorage.removeItem('worklog.shifts.v1');
        localStorage.removeItem('worklog.quickshifts.v1');
        localStorage.removeItem('worklog.settings.v1');
        localStorage.removeItem('worklog.sort.v1');
      } catch {}
      setShifts(seedShifts());
      setQuickShifts(seedQuickShifts());
      setSettings(DEFAULT_SETTINGS);
      setSortBy('date-desc');
      setView('list');
    };

    /* views */
    if (view === 'settings') {
      return <SettingsScreen settings={settings} setSettings={setSettings} onBack={() => setView('list')} onResetAll={resetAll} />;
    }
    if (view === 'quickshifts') {
      return <QuickShiftsScreen quickShifts={quickShifts} setQuickShifts={setQuickShifts} settings={settings} onBack={() => setView('list')} />;
    }

    return (
      <div className="min-h-screen">
        {/* Header */}
        <header className="sticky top-0 z-20 bg-zinc-950/85 backdrop-blur-md border-b border-zinc-900/80">
          <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
            <div className="flex items-baseline gap-2">
              <span className="text-lg font-semibold tracking-tight">Worklog</span>
              <span className="text-[10px] uppercase tracking-[0.2em] text-accent-400/80">v1</span>
            </div>
            <div className="flex items-center gap-2">
              <IconBtn label="Export" onClick={() => setExportOpen(true)}><I.download /></IconBtn>
              <IconBtn label="Settings" onClick={() => setView('settings')}><I.gear /></IconBtn>
            </div>
          </div>
        </header>

        {/* Main */}
        <main className="max-w-2xl mx-auto px-4 py-5 space-y-4">

          <QuickShiftBar quickShifts={quickShifts} onUse={useQuick} onManage={() => setView('quickshifts')} />

          <FilterBar
            search={search} setSearch={setSearch}
            dateFrom={dateFrom} setDateFrom={setDateFrom}
            dateTo={dateTo} setDateTo={setDateTo}
            sortBy={sortBy} setSortBy={setSortBy}
            onClear={() => { setSearch(''); setDateFrom(''); setDateTo(''); }}
          />

          <SummaryBar shifts={filtered} settings={settings} />

          <MileageSection shifts={filtered} settings={settings} setSettings={setSettings} />

          <div className="space-y-3 pt-1">
            {filtered.length === 0 ? (
              <div className="text-center text-zinc-500 py-16 rounded-2xl ring-1 ring-zinc-900 bg-zinc-900/30">
                {shifts.length === 0
                  ? <>No shifts yet.<br/><span className="text-zinc-600 text-sm">Tap <span className="text-accent-400">+</span> to add one, or use a quick shift above.</span></>
                  : 'No shifts match your filters.'}
              </div>
            ) : (
              filtered.map(s => <ShiftCard key={s.id} shift={s} settings={settings} onClick={() => openEdit(s)} />)
            )}
          </div>

          <div className="h-32 safe-bottom" />
        </main>

        {/* Floating + */}
        <button onClick={openNew} aria-label="Add shift"
                className="fixed right-4 bottom-4 z-30 w-14 h-14 rounded-full bg-accent-500 hover:bg-accent-400 text-zinc-950 flex items-center justify-center shadow-2xl shadow-accent-500/30 transition active:scale-95"
                style={{ marginBottom: 'env(safe-area-inset-bottom)' }}>
          <I.plus width="24" height="24" />
        </button>

        {modal && (
          <ShiftModal
            open={modal.open}
            initial={modal.shift}
            isEdit={modal.isEdit}
            settings={settings}
            onSave={saveShift}
            onDelete={deleteShift}
            onClose={() => setModal(null)}
          />
        )}

        {exportOpen && (
          <ExportMenu
            filteredShifts={filtered}
            settings={settings}
            summaryText={summaryText}
            dateRangeText={dateRangeText}
            onClose={() => setExportOpen(false)}
          />
        )}
      </div>
    );
  }

  /* -------------------- Mount -------------------- */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
